<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>ImpactGrid Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<!-- Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Supabase Client -->
<script src="supabase.js"></script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0b1220;
color:#e5e7eb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-container{
background:#111827;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:25px;
}

.logo img{
height:40px;
}

.logo-text{
font-weight:700;
font-size:20px;
}

.subtitle{
font-size:13px;
color:#94a3b8;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#errorMessage{
margin-top:10px;
color:#f87171;
font-size:13px;
}

.footer{
margin-top:25px;
font-size:12px;
color:#64748b;
text-align:center;
}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">
<img src="logo.png">
<div class="logo-text">ImpactGrid</div>
</div>

<div class="subtitle">
SME Financial Stability Platform
</div>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<div id="errorMessage"></div>

<div class="footer">
© 2026 ImpactGrid Analytics
</div>

</div>

<script>

/* ================= AUTO REDIRECT IF LOGGED IN ================= */

async function checkSession(){

const { data: { session } } = await window.supabaseClient.auth.getSession();

if(session){
window.location.href = "index.html";
}

}

checkSession();

/* ================= LOGIN ================= */

async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await window.supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){
document.getElementById("errorMessage").innerText = error.message;
return;
}

window.location.href = "index.html";

}

</script>

</body>
</html>
